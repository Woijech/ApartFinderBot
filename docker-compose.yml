services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      APARTMENTFINDER_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-apartmentfinder}:${POSTGRES_PASSWORD:-apartmentfinder}@postgres:5432/${POSTGRES_DB:-apartmentfinder}
    depends_on:
      postgres:
        condition: service_healthy
      cloakbrowser:
        condition: service_healthy
    restart: unless-stopped

  cloakbrowser:
    image: cloakhq/cloakbrowser
    command: cloakserve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apartmentfinder}
      POSTGRES_USER: ${POSTGRES_USER:-apartmentfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apartmentfinder}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:

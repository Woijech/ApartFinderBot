services:
  bot:
    build: .
    command: sh -c "alembic upgrade head && apartmentfinder-bot"
    env_file:
      - .env
    environment:
      APARTMENTFINDER_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-apartmentfinder}:${POSTGRES_PASSWORD:-apartmentfinder}@postgres:5432/${POSTGRES_DB:-apartmentfinder}
      CLOAKBROWSER_CACHE_DIR: /root/.cache/cloakbrowser
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cloakbrowser_cache:/root/.cache/cloakbrowser
    restart: unless-stopped

  worker:
    build: .
    command: sh -c "alembic upgrade head && apartmentfinder-worker"
    env_file:
      - .env
    environment:
      APARTMENTFINDER_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-apartmentfinder}:${POSTGRES_PASSWORD:-apartmentfinder}@postgres:5432/${POSTGRES_DB:-apartmentfinder}
      CLOAKBROWSER_CACHE_DIR: /root/.cache/cloakbrowser
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cloakbrowser_cache:/root/.cache/cloakbrowser
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apartmentfinder}
      POSTGRES_USER: ${POSTGRES_USER:-apartmentfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apartmentfinder}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cloakbrowser_cache:
  postgres_data:
